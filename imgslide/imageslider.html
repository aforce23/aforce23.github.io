<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before & After Slider</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

        :root {
            --handle-color: #ffffff;
            --handle-size: 44px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111;
            font-family: 'DM Mono', monospace;
            gap: 20px;
        }

        /* Wrapper holds the container + the fullscreen button positioned relative to it */
        .slider-wrapper {
            position: relative;
            width: 90vw;
            max-width: 1100px;
        }

        .slider-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 10px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.08),
                0 20px 60px rgba(0,0,0,0.7),
                0 0 70px 8px rgba(255,255,255,0.15);
            user-select: none;
            cursor: ew-resize;
            transition: box-shadow 0.4s ease;
        }

        /* Fullscreen: wrapper fills viewport, container centred */
        .slider-wrapper:fullscreen,
        .slider-wrapper:-webkit-full-screen {
            width: 100vw;
            max-width: none;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        .slider-wrapper:fullscreen .slider-container,
        .slider-wrapper:-webkit-full-screen .slider-container {
            width: min(100vw, calc(100vh * 16 / 9));
            aspect-ratio: 16 / 9;
            border-radius: 0;
        }

        /* Both image layers sit flush, full-size */
        .img-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .img-layer img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* KEY FIX: foreground layer is always full-size;
           clip-path reveals only the left portion — image never scales or shifts */
        .img-foreground {
            z-index: 2;
            clip-path: inset(0 50% 0 0);
        }

        /* Divider line */
        .divider-line {
            position: absolute;
            top: 0; bottom: 0;
            left: 50%;
            width: 2px;
            background: var(--handle-color);
            transform: translateX(-50%);
            z-index: 4;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(255,255,255,0.45);
        }

        /* Labels */
        .label {
            position: absolute;
            top: 16px;
            padding: 5px 12px;
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            border-radius: 4px;
            pointer-events: none;
            z-index: 6;
            transition: opacity 0.25s ease;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.85);
        }

        .label-before { left: 16px; z-index: 6; }
        .label-after  { right: 16px; z-index: 3; }

        /* Handle knob */
        .handle-visual {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: var(--handle-size);
            height: var(--handle-size);
            background: var(--handle-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 2px 16px rgba(0,0,0,0.35), 0 0 0 2px rgba(255,255,255,0.15);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        .handle-visual.dragging {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,255,255,0.3);
        }

        .handle-visual svg {
            width: 18px; height: 18px;
            fill: none; stroke: #333;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Invisible range input covers the entire container */
        .slider-input {
            position: absolute;
            inset: 0;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            outline: none;
            margin: 0; padding: 0;
            z-index: 10;
            cursor: ew-resize;
            opacity: 0;
        }

        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 44px;
            height: 100vh;
        }

        .slider-input::-moz-range-thumb {
            width: 44px;
            height: 100vh;
            border: none;
            background: transparent;
        }

        /* ── Fullscreen Button ───────────────────────────────────── */
        .btn-fullscreen {
            position: absolute;
            bottom: 14px;
            right: 14px;
            z-index: 20;
            width: 34px;
            height: 34px;
            padding: 0;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 7px;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }

        .btn-fullscreen:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.35);
            transform: scale(1.07);
        }

        .btn-fullscreen:active { transform: scale(0.96); }

        .btn-fullscreen svg {
            width: 16px; height: 16px;
            fill: none; stroke: currentColor;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
            pointer-events: none;
        }

        .icon-expand   { display: block; }
        .icon-compress { display: none; }

        :fullscreen           .icon-expand   { display: none; }
        :fullscreen           .icon-compress { display: block; }
        :-webkit-full-screen  .icon-expand   { display: none; }
        :-webkit-full-screen  .icon-compress { display: block; }
    </style>
</head>
<body>

<div class="slider-wrapper" id="wrapper">
    <div class="slider-container" id="container">

        <!-- After (right / background) — always full-size, never moves -->
        <div class="img-layer img-background">
            <img id="imgAfter" src="frieren_wallpaper_s2e3_1.png" alt="After" crossorigin="anonymous">
        </div>

        <!-- Before (left / foreground) — full-size, revealed by clip-path -->
        <div class="img-layer img-foreground" id="foreground">
            <img id="imgBefore" src="frieren_wallpaper_s2e3_1_yt.png" alt="Before" crossorigin="anonymous">
        </div>

        <!-- Divider line -->
        <div class="divider-line" id="dividerLine"></div>

        <!-- Labels -->
        <div class="label label-before" id="labelBefore">Before</div>
        <div class="label label-after"  id="labelAfter">After</div>

        <!-- Handle knob -->
        <div class="handle-visual" id="handle">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
        </div>

        <!-- Invisible range input -->
        <input type="range" min="0" max="100" value="50" class="slider-input" id="slider">
    </div>

    <!-- Fullscreen button — lives in wrapper so it stays over the image in fullscreen too -->
    <button class="btn-fullscreen" id="btnFullscreen" title="Toggle fullscreen (F)" aria-label="Toggle fullscreen">
        <svg class="icon-expand" viewBox="0 0 24 24">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3"  y1="21" x2="10" y2="14"/>
        </svg>
        <svg class="icon-compress" viewBox="0 0 24 24">
            <polyline points="4 14 10 14 10 20"/>
            <polyline points="20 10 14 10 14 4"/>
            <line x1="10" y1="14" x2="3"  y2="21"/>
            <line x1="21" y1="3"  x2="14" y2="10"/>
        </svg>
    </button>
</div>

<script>
(function () {
    const slider      = document.getElementById('slider');
    const foreground  = document.getElementById('foreground');
    const handle      = document.getElementById('handle');
    const divLine     = document.getElementById('dividerLine');
    const container   = document.getElementById('container');
    const wrapper     = document.getElementById('wrapper');
    const imgBefore   = document.getElementById('imgBefore');
    const imgAfter    = document.getElementById('imgAfter');
    const labelBefore = document.getElementById('labelBefore');
    const labelAfter  = document.getElementById('labelAfter');
    const btnFS       = document.getElementById('btnFullscreen');

    // ── Position ──────────────────────────────────────────────────────
    function setPosition(value) {
        const pct = parseFloat(value);

        // clip-path reveals the left `pct`% of the foreground image.
        // The image itself is never scaled or translated — perfect alignment.
        foreground.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;

        divLine.style.left = `${pct}%`;
        handle.style.left  = `${pct}%`;

        labelBefore.style.opacity = pct < 18 ? Math.max(0, pct / 18) : 1;
        labelAfter.style.opacity  = pct > 82 ? Math.max(0, (100 - pct) / 18) : 1;

        updateGlow(pct);
    }

    // ── Dynamic glow ──────────────────────────────────────────────────
    let colorBefore = { r: 180, g: 180, b: 180 };
    let colorAfter  = { r: 80,  g: 130, b: 190 };

    function sampleColor(imgEl, cb) {
        const run = () => {
            const c = document.createElement('canvas');
            c.width = c.height = 60;
            try {
                const ctx = c.getContext('2d');
                ctx.drawImage(imgEl, 0, 0, 60, 60);
                const d = ctx.getImageData(0, 0, 60, 60).data;
                let r = 0, g = 0, b = 0, n = 0;
                for (let i = 0; i < d.length; i += 16) { r += d[i]; g += d[i+1]; b += d[i+2]; n++; }
                cb({ r: r/n, g: g/n, b: b/n });
            } catch(e) { cb(null); }
        };
        imgEl.complete && imgEl.naturalWidth ? run() : (imgEl.onload = run);
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function updateGlow(pct) {
        const t = pct / 100;
        const r = Math.round(lerp(colorBefore.r, colorAfter.r, t));
        const g = Math.round(lerp(colorBefore.g, colorAfter.g, t));
        const b = Math.round(lerp(colorBefore.b, colorAfter.b, t));
        container.style.boxShadow = `
            0 0 0 1px rgba(255,255,255,0.08),
            0 20px 60px rgba(0,0,0,0.7),
            0 0 60px 6px rgba(${r},${g},${b},0.5),
            0 0 110px 18px rgba(${r},${g},${b},0.18)
        `;
    }

    let loaded = 0;
    sampleColor(imgBefore, (c) => { if (c) colorBefore = c; if (++loaded === 2) updateGlow(50); });
    sampleColor(imgAfter,  (c) => { if (c) colorAfter  = c; if (++loaded === 2) updateGlow(50); });

    // ── Slider events ─────────────────────────────────────────────────
    slider.addEventListener('input', (e) => setPosition(e.target.value));
    slider.addEventListener('mousedown',  () => handle.classList.add('dragging'));
    slider.addEventListener('touchstart', () => handle.classList.add('dragging'), { passive: true });
    slider.addEventListener('mouseup',    () => handle.classList.remove('dragging'));
    slider.addEventListener('touchend',   () => handle.classList.remove('dragging'));

    // ── Fullscreen ────────────────────────────────────────────────────
    btnFS.addEventListener('click', () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            (wrapper.requestFullscreen || wrapper.webkitRequestFullscreen).call(wrapper);
        } else {
            (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'f' || e.key === 'F') btnFS.click();
    });

    // ── Init ──────────────────────────────────────────────────────────
    setPosition(50);
})();
</script>
</body>
</html>
